<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Анкета</title>

<style>
body {
    font-family: Arial;
    background: #eef1f5;
    display: flex;
    justify-content: center;
}

.container {
    margin-top: 40px;
    width: 350px;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.skills {
    text-align: left;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #333;
}

#result {
    margin-top: 15px;
    font-weight: bold;
    display: none;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container" id="formBlock">
<h2>Анкета</h2>

<input id="nameInput" placeholder="Имя">
<input id="ageInput" placeholder="Возраст">

<select id="gender">
<option value="">Пол</option>
<option value="М">М</option>
<option value="Ж">Ж</option>
</select>

<input id="university" placeholder="Образование (например: высшее)">

<div class="skills">
<label><input type="checkbox" class="skill"> Математика</label><br>
<label><input type="checkbox" class="skill"> Программирование</label><br>
<label><input type="checkbox" class="skill"> Английский</label><br>
<label><input type="checkbox" class="skill"> Коммуникация</label>
</div>

<button onclick="checkForm()">Меня возьмут?</button>
<button onclick="enableEdit()">Редактировать</button>

<p id="result"></p>

</div>

<script>
function validateName(name) {
    return /^[a-zA-Zа-яА-Я]+$/.test(name);
}

function validateAge(age) {
    return Number.isInteger(Number(age)) && age >= 0;
}

function validateGender(g) {
    return g === "М" || g === "Ж";
}

function getSkills() {
    return Array.from(document.querySelectorAll(".skill"))
        .filter(el => el.checked).length;
}

function hasSkill(text) {
    let labels = document.querySelectorAll(".skills label");
    for (let l of labels) {
        if (l.innerText.includes(text) && l.querySelector("input").checked) {
            return true;
        }
    }
    return false;
}

function lockCheckboxes() {
    document.querySelectorAll(".skill").forEach(cb => cb.disabled = true);
}

function unlockInputs() {
    document.querySelectorAll("input, select").forEach(el => el.disabled = false);
}

function lockInputs() {
    document.querySelectorAll("input, select").forEach(el => el.disabled = true);
}

function checkForm() {
    let name = document.getElementById("nameInput").value;
    let age = document.getElementById("ageInput").value;
    let gender = document.getElementById("gender").value;
    let edu = document.getElementById("university").value.toLowerCase();

    if (!validateName(name)) {
        alert("Имя некорректно");
        return;
    }

    if (!validateAge(age)) {
        alert("Возраст некорректен");
        return;
    }

    if (!validateGender(gender)) {
        alert("Выберите пол");
        return;
    }

    let result = document.getElementById("result");
    result.style.display = "block";

    let success = false;

    if (hasSkill("Математика") && hasSkill("Программирование")) {
        success = true;
    }

    if (edu.includes("высшее") && getSkills() >= 2) {
        success = true;
    }

    result.innerText = success ? "Меня возьмут" : "Недостаточно навыков";

    lockCheckboxes();
    lockInputs();
    document.getElementById("formBlock").classList.add("filled");
}

function enableEdit() {
    unlockInputs();
    document.querySelectorAll(".skill").forEach(cb => cb.disabled = false);
}
</script>

</body>
</html>
