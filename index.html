<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Резюме</title>
<style>
    body {
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
    }

    .container {
        margin: 20px auto;
        width: 300px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
        color: #333;
        text-shadow: 1px 1px 2px gray;
    }

    img {
        width: 100px;
        border-radius: 50%;
        border: 2px solid #333;
    }

    button {
        margin-top: 10px;
        padding: 5px 10px;
        cursor: pointer;
    }

    button:hover {
        background: black;
        color: white;
    }
</style>
</head>
<body>
    <div class="container">
        <img src="https://via.placeholder.com/100">
        <br><br>
        <input id="nameInput" placeholder="Имя">
        <input id="ageInput" placeholder="Возраст">
        <label><input type="checkbox" id="skillMath">Математика</label>
        <label><input type="checkbox" id="skillProg">Программирование</label>
        <button onclick="checkForm()">Отправить</button>
        <p id="result" style="display:none;">Меня возьмут</p>
        <br>
        <button onclick="randomColor()">Случайный фон</button>
    </div>
    <script>
        function randomColor() {
            document.body.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);
        }
        function validateName(name) {
            return /^[a-zA-Zа-яА-Я]+$/.test(name);
        }

        function validateAge(age) {
            return Number.isInteger(Number(age)) && age >= 0;
        }

        function checkForm() {
            let name = document.getElementById("nameInput").value;
            let age = document.getElementById("ageInput").value;

            if (!validateName(name)) {
                alert("Имя некорректно");
                return;
            }

            if (!validateAge(age)) {
                alert("Возраст некорректен");
                return;
            }

            document.getElementById("result").style.display = "block";
        }
    </script>

</body>
</html>
