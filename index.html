<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Резюме</title>
<style>
    body {
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
    }

    .container {
        margin: 20px auto;
        width: 300px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
        color: #333;
        text-shadow: 1px 1px 2px gray;
    }

    img {
        width: 100px;
        border-radius: 50%;
        border: 2px solid #333;
    }

    button {
        margin-top: 10px;
        padding: 5px 10px;
        cursor: pointer;
    }

    button:hover {
        background: black;
        color: white;
    }
</style>
</head>
<body>
    <div class="container">
        <h1 id="name">Алексей</h1>
        <p id="surname">Иванов</p>
        <img src="https://via.placeholder.com/100">
        <br><br>
        <input type="text" id="inputSurname" placeholder="Новая фамилия">
        <br>
        <button onclick="changeSurname()">Изменить фамилию</button>
        <br>
        <button onclick="randomColor()">Случайный фон</button>
    </div>
    <script>
        function changeSurname() {
            let value = document.getElementById("inputSurname").value;
            document.getElementById("surname").innerText = value;
        }
        function randomColor() {
            document.body.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);
        }
    </script>
</body>
</html>
