<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Анкета</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 320px;
    padding: 25px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input.error {
    border: 1px solid red;
    background: #ffe6e6;
}

.skills {
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #1976d2;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0d47a1;
}

#result {
    display: none;
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    color: green;
}

.disabled {
    opacity: 0.5;
    pointer-events: none;
}
</style>

</head>

<body>

<div class="container">
    <h2>Анкета</h2>

    <input id="nameInput" placeholder="Имя">
    <input id="ageInput" placeholder="Возраст">

    <div class="skills">
        <label><input type="checkbox" id="skillMath"> Математика</label><br>
        <label><input type="checkbox" id="skillProg"> Программирование</label><br>
        <label><input type="checkbox" id="skillOther"> Другое</label>
    </div>

    <button onclick="checkForm()">Отправить</button>

    <div id="result">Меня возьмут</div>

    <button onclick="randomColor()">Случайный фон</button>
</div>

<script>
function randomColor() {
    document.body.style.background =
        "#" + Math.floor(Math.random()*16777215).toString(16);
}

function validateName(name) {
    return /^[a-zA-Zа-яА-Я]+$/.test(name);
}

function validateAge(age) {
    return Number.isInteger(Number(age)) && age >= 0;
}

function checkForm() {
    let nameInput = document.getElementById("nameInput");
    let ageInput = document.getElementById("ageInput");

    let name = nameInput.value;
    let age = ageInput.value;

    let math = document.getElementById("skillMath").checked;
    let prog = document.getElementById("skillProg").checked;

    nameInput.classList.remove("error");
    ageInput.classList.remove("error");

    let valid = true;

    if (!validateName(name)) {
        nameInput.classList.add("error");
        valid = false;
    }

    if (!validateAge(age)) {
        ageInput.classList.add("error");
        valid = false;
    }

    if (!valid) return;

    // логика навыков (пункт 6)
    if (math && prog) {
        document.getElementById("result").style.display = "block";
    } else {
        alert("Недостаточно навыков");
        return;
    }

    // блокировка формы (пункт 4)
    document.querySelectorAll("input").forEach(el => el.disabled = true);

    document.querySelector(".skills").classList.add("disabled");
}
</script>

</body>
</html>
